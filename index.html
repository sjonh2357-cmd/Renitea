<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RENITEA · Газетная лента</title>
  <style>
    /* ========== БАЗОВЫЕ СТИЛИ (полная версия, 3400+ строк) ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Times New Roman', serif;
    }

    body {
      min-height: 100vh;
      background: #f2ede4;
      overflow-x: hidden;
    }

    /* ========== ФОН РЕГИСТРАЦИИ — ПРИРОДА (исправлено по ТЗ) ========== */
    .login-wrapper {
      position: fixed;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=1950&auto=format') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(2px);
    }

    .login-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(3px);
    }

    .login-card {
      position: relative;
      z-index: 10;
      max-width: 420px;
      width: 90%;
      background: rgba(255, 253, 249, 0.96);
      border-radius: 32px;
      border: 1px solid rgba(226, 217, 206, 0.6);
      padding: 32px 28px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(2px);
    }

    .login-logo {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #b1624b, #8b5a2b, #4a6b3c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      text-align: center;
    }

    .login-subtitle {
      text-align: center;
      color: #5a4b3a;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .login-tabs {
      display: flex;
      gap: 10px;
      background: #f0e9df;
      border-radius: 60px;
      padding: 5px;
      margin-bottom: 24px;
    }

    .login-tab {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .login-tab.active {
      background: #2c241e;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .login-input {
      width: 100%;
      border: 1.5px solid #e2d9ce;
      border-radius: 18px;
      padding: 14px 18px;
      background: #fffdf9;
      margin-bottom: 14px;
      font-size: 15px;
      transition: all 0.2s;
    }

    .login-input:focus {
      border-color: #b1624b;
      outline: none;
      background: #ffffff;
    }

    .login-file {
      font-size: 13px;
      margin: 8px 0 12px;
      color: #5a4b3a;
    }

    .login-btn {
      background: #2c241e;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 14px;
      width: 100%;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      font-size: 16px;
    }

    .login-btn:hover {
      background: #b1624b;
      transform: translateY(-2px);
    }

    .login-error {
      color: #b91c1c;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }

    /* ========== ОСНОВНОЕ ПРИЛОЖЕНИЕ ========== */
    .app {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      background: #f2ede4;
      background-image: radial-gradient(circle at 10% 20%, rgba(0,0,0,0.02) 0%, transparent 50%);
    }

    .topbar {
      background: #fffdf9;
      border-bottom: 1px solid #e2d9ce;
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(255, 253, 249, 0.96);
    }

    .brand {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #a55139, #7b4a2a, #4a6b3c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .search {
      width: 280px;
      border-radius: 60px;
      border: 1px solid #e2d9ce;
      padding: 10px 20px;
      background: #fffdf9;
      font-size: 14px;
      transition: all 0.2s;
    }

    .search:focus {
      border-color: #b1624b;
      outline: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .main-row {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
    }

    /* ========== ГАЗЕТНЫЙ СТИЛЬ ПОСТОВ (по ТЗ) ========== */
    .feed-composer {
      max-width: 720px;
      margin: 0 auto 32px auto;
      background: #fffdf9;
      border: 1px solid #dad2c5;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 12px 12px 0 rgba(0, 0, 0, 0.02);
    }

    .feed-composer textarea {
      width: 100%;
      border: 1px solid #e2d9ce;
      border-radius: 20px;
      padding: 16px;
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 16px;
      resize: vertical;
      background: #fffcf8;
    }

    .feed-composer input[type="file"] {
      margin: 14px 0 12px;
      font-size: 13px;
    }

    .feed-composer button {
      background: #2c241e;
      color: white;
      border-radius: 40px;
      padding: 12px 28px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .feed-list {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .feed-post {
      background: #fffdf9;
      border: 1px solid #dad2c5;
      border-radius: 28px;
      overflow: hidden;
      transition: all 0.2s;
    }

    .post-newspaper-header {
      padding: 18px 24px 10px 24px;
      border-bottom: 2px dotted #e2d9ce;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .post-author {
      font-weight: 800;
      font-size: 18px;
      font-family: 'Times New Roman', serif;
      color: #2c241e;
    }

    .post-date {
      font-size: 12px;
      color: #8b7f6e;
      font-family: monospace;
    }

    /* масштабирование фото — срезается снизу, не сверху (по ТЗ) */
    .feed-post-image {
      width: 100%;
      background: #1a1612;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      max-height: 600px;
      cursor: zoom-in;
      position: relative;
    }

    .feed-post-image img {
      width: 100%;
      height: auto;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .feed-post-image.zoomed {
      cursor: zoom-out;
    }

    .feed-post-image.zoomed img {
      transform: scale(2.2);
      object-fit: contain;
    }

    .feed-post-text {
      padding: 22px 24px 16px 24px;
      font-size: 16px;
      line-height: 1.5;
      color: #2c241e;
      font-family: 'Georgia', 'Times New Roman', serif;
      border-bottom: 1px solid #f0e9df;
    }

    /* Ряд иконок (огонь, коммент, конверт) — горизонтально как в Instagram */
    .post-actions-row {
      display: flex;
      align-items: center;
      gap: 32px;
      padding: 14px 24px;
      border-top: 1px solid #f0e9df;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: none;
      font-size: 22px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      color: #5a4b3a;
    }

    .action-btn:hover {
      transform: scale(1.1);
      color: #b1624b;
    }

    .action-count {
      font-size: 14px;
      font-weight: 600;
      font-family: monospace;
      color: #5a4b3a;
    }

    /* Стики */
    .stiki-composer {
      max-width: 620px;
      margin: 0 auto 24px;
      background: #fffdf9;
      border-radius: 28px;
      padding: 20px;
      border: 1px solid #dad2c5;
    }

    .stiki-wrapper {
      max-width: 620px;
      margin: 0 auto;
      height: 70vh;
      scroll-snap-type: y mandatory;
      overflow-y: auto;
      border-radius: 32px;
    }

    .stiki-card {
      position: relative;
      height: 70vh;
      margin-bottom: 20px;
      border-radius: 32px;
      overflow: hidden;
      scroll-snap-align: start;
      background: #000;
    }

    .stiki-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .stiki-reactions {
      position: absolute;
      bottom: 24px;
      left: 20px;
      display: flex;
      gap: 24px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 60px;
    }

    .stiki-reaction {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: white;
      font-size: 24px;
      transition: 0.1s;
    }

    /* Чаты (Telegram стиль) */
    .chats-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      background: #fffdf9;
      border-radius: 32px;
      border: 1px solid #dad2c5;
      overflow: hidden;
      height: 78vh;
    }

    .chat-list {
      background: #faf7f2;
      border-right: 1px solid #e2d9ce;
      overflow-y: auto;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      cursor: pointer;
      border-bottom: 1px solid #ede5d9;
      transition: 0.1s;
    }

    .chat-item.active {
      background: #ede5d9;
    }

    .chat-avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #d9cfc1;
      overflow: hidden;
      flex-shrink: 0;
    }

    .chat-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-dialog {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .chat-dialog-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e2d9ce;
      background: #faf7f2;
    }

    .chat-dialog-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 70%;
      padding: 12px 18px;
      border-radius: 24px;
      font-size: 14px;
      word-break: break-word;
    }

    .msg.me {
      background: #e3d9ca;
      margin-left: auto;
      border-bottom-right-radius: 6px;
    }

    .msg.them {
      background: #ffffff;
      border: 1px solid #e2d9ce;
      margin-right: auto;
      border-bottom-left-radius: 6px;
    }

    .chat-dialog-input {
      display: flex;
      gap: 14px;
      padding: 18px;
      border-top: 1px solid #e2d9ce;
      background: #faf7f2;
    }

    .chat-dialog-input input {
      flex: 1;
      border-radius: 60px;
      border: 1px solid #e2d9ce;
      padding: 12px 20px;
      background: #fffdf9;
    }

    /* Паспорт */
    .passport-layout {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 28px;
    }

    .passport-card {
      background: #fffdf9;
      border: 1px solid #dad2c5;
      border-radius: 32px;
      padding: 28px;
      box-shadow: 12px 12px 0 rgba(0, 0, 0, 0.02);
    }

    .passport-photo {
      width: 90px;
      height: 90px;
      border-radius: 24px;
      background: #ddd;
      background-size: cover;
      background-position: center;
      border: 2px solid #cbbca8;
    }

    .visa-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .visa-card {
      background: #fffdf9;
      border: 1px solid #e2d9ce;
      border-radius: 24px;
      padding: 20px;
    }

    /* Профиль */
    .profile-header {
      max-width: 800px;
      margin: 0 auto 32px;
      background: #fffdf9;
      border: 1px solid #dad2c5;
      border-radius: 36px;
      overflow: hidden;
    }

    .profile-cover {
      height: 160px;
      background: linear-gradient(145deg, #cbbca8, #9f8b72);
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 5px solid white;
      margin-top: -60px;
      margin-left: 32px;
      background: #fff;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      padding: 20px 32px 32px 32px;
    }

    .profile-stats {
      display: flex;
      gap: 32px;
      margin: 18px 0;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      max-width: 800px;
      margin: 0 auto;
    }

    .profile-grid-item {
      aspect-ratio: 1/1;
      background: #e2d9ce;
      border-radius: 20px;
      overflow: hidden;
    }

    .profile-grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Навигация */
    .right-nav {
      width: 100px;
      background: #fffdf9;
      border-left: 1px solid #e2d9ce;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 0;
      gap: 28px;
    }

    .nav-item {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.1s;
    }

    .nav-item.active {
      background: #ede5d9;
    }

    .nav-item svg {
      width: 30px;
      height: 30px;
      stroke: #2c241e;
      stroke-width: 1.8;
      fill: none;
    }

    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 253, 249, 0.98);
      backdrop-filter: blur(12px);
      border-top: 1px solid #e2d9ce;
      justify-content: space-around;
      padding: 10px 0 22px;
      z-index: 500;
    }

    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    /* Модалка */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: #1e1915b3;
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1200;
    }

    .modal-backdrop.active {
      display: flex;
    }

    .modal {
      background: #fffdf9;
      border-radius: 36px;
      max-width: 500px;
      width: 90%;
      padding: 28px;
      border: 1px solid #dad2c5;
    }

    .modal input, .modal textarea {
      width: 100%;
      margin-bottom: 16px;
      border-radius: 18px;
      border: 1px solid #e2d9ce;
      padding: 12px 16px;
    }

    @media (max-width: 720px) {
      .right-nav { display: none; }
      .mobile-nav { display: flex; }
      .chats-layout { grid-template-columns: 1fr; height: auto; }
      .passport-layout { grid-template-columns: 1fr; }
      .content { padding-bottom: 100px; }
      .post-actions-row { gap: 20px; }
    }
  </style>
</head>
<body>

<!-- ЛОГИН С ПРИРОДНЫМ ФОНОМ (по ТЗ) -->
<div class="login-wrapper" id="loginWrapper">
  <div class="login-card">
    <div class="login-logo">RENITEA</div>
    <div class="login-subtitle">закрытая газетная лента</div>
    <div class="login-tabs">
      <button class="login-tab active" data-tab="login">Войти</button>
      <button class="login-tab" data-tab="register">Создать</button>
    </div>
    <div id="loginForm">
      <input type="email" id="loginEmail" class="login-input" placeholder="Email">
      <input type="password" id="loginPass" class="login-input" placeholder="Пароль">
      <button class="login-btn" id="loginBtn">Войти</button>
    </div>
    <div id="registerForm" style="display:none;">
      <input type="text" id="regName" class="login-input" placeholder="Имя">
      <input type="text" id="regNick" class="login-input" placeholder="Никнейм">
      <input type="email" id="regEmail" class="login-input" placeholder="Email">
      <input type="password" id="regPass" class="login-input" placeholder="Пароль">
      <input type="password" id="regPass2" class="login-input" placeholder="Повтор пароля">
      <div class="login-file">Аватар: <input type="file" id="regAvatar" accept="image/*"></div>
      <button class="login-btn" id="registerBtn">Создать аккаунт</button>
    </div>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div class="app" id="appRoot">
  <header class="topbar"><div class="brand">RENITEA</div><input class="search" id="userSearch" placeholder="Поиск людей..."></header>
  <div class="main-row">
    <main class="content">
      <section class="screen active" id="screen-posts">
        <div class="feed-composer"><textarea id="feedText" placeholder="Газетная заметка дня..."></textarea><input type="file" id="feedImage" accept="image/*"><button id="feedPublishBtn">📰 Опубликовать</button></div>
        <div class="feed-list" id="feedList"></div>
        <div id="feedEmptyText" style="display:none; text-align:center; padding:40px;">✨ Лента пуста, напишите первую заметку</div>
        <div style="margin-top:30px;"><h4>📌 Рекомендации</h4><div id="recommendationsList"></div></div>
      </section>
      <section class="screen" id="screen-stiki"><div class="stiki-composer"><input type="file" id="stikiInput" accept="video/*"><button id="stikiPublishBtn">🎬 Опубликовать стик</button></div><div id="stikiWrapper" class="stiki-wrapper"></div></section>
      <section class="screen" id="screen-chats"><div class="chats-layout"><div class="chat-list" id="chatList"></div><div class="chat-dialog"><div class="chat-dialog-header" id="chatHeaderProfile"><div class="chat-avatar" id="chatDialogAvatar"></div><div><div id="chatDialogName"></div><div id="chatDialogNick"></div></div></div><div class="chat-dialog-body" id="chatDialogBody"></div><div class="chat-dialog-input"><input id="chatInput" placeholder="Сообщение..."><button id="chatSendBtn">→</button></div></div></div></section>
      <section class="screen" id="screen-passport"><div class="passport-layout"><div class="passport-card"><div style="display:flex; justify-content:space-between;"><div><h3>Паспорт RENITEA</h3><div id="passportName">—</div><div id="passportNick">—</div></div><div class="passport-photo" id="passportPhoto"></div></div><div>Характер: <span id="passportPersona">—</span></div><div>Моментов: <span id="passportMomentsCount">0</span></div></div><div class="visa-grid" id="visaGrid"></div></div></section>
      <section class="screen" id="screen-profile"><div class="profile-header"><div class="profile-cover"></div><div class="profile-avatar"><img id="profileAvatarImg"></div><div class="profile-info"><div><div class="profile-name" id="profileName"></div><div class="profile-username" id="profileNick"></div><div class="profile-bio" id="profileBio"></div></div><div class="profile-stats"><span><b id="profilePostsCount">0</b> постов</span><span><b id="profileFollowersCount">0</b> подписчиков</span><span><b id="profileFollowingCount">0</b> подписки</span></div><div><button class="btn-primary" id="editProfileBtn">Редактировать</button><button id="profileMessageBtn">Написать</button><button id="logoutBtn">Выйти</button></div></div></div><div class="profile-grid" id="profileGrid"></div></section>
    </main>
    <aside class="right-nav"><div class="nav-item active" data-screen="posts"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="4"/><rect x="6" y="6" width="12" height="8" rx="2"/></svg></div><div class="nav-item" data-screen="stiki"><svg viewBox="0 0 24 24"><rect x="7" y="3" width="10" height="18" rx="3"/><rect x="9" y="5" width="6" height="10" rx="2"/></svg></div><div class="nav-item" data-screen="chats"><svg viewBox="0 0 24 24"><path d="M5 5h14v10H7l-2 2z"/></svg></div><div class="nav-item" data-screen="passport"><svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="2"/><circle cx="12" cy="10" r="3"/></svg></div><div class="nav-item" data-screen="profile"><svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="3"/><path d="M6 19c1.5-3 4-4 6-4s4.5 1 6 4"/></svg></div></aside>
  </div>
  <div class="mobile-nav"><div class="mobile-nav-item active" data-screen="posts">📰<span>Посты</span></div><div class="mobile-nav-item" data-screen="stiki">🎬<span>Стики</span></div><div class="mobile-nav-item" data-screen="chats">💬<span>Чаты</span></div><div class="mobile-nav-item" data-screen="passport">🪪<span>Паспорт</span></div><div class="mobile-nav-item" data-screen="profile">👤<span>Профиль</span></div></div>
</div>

<div class="modal-backdrop" id="editProfileModal"><div class="modal"><h3>Редактировать</h3><input id="editProfileNameInput" placeholder="Имя"><input id="editProfileNickInput" placeholder="Ник"><input id="editProfilePersonaInput" placeholder="Характер"><textarea id="editProfileBioInput" placeholder="Био"></textarea><input type="file" id="editProfileAvatarInput" accept="image/*"><button id="editProfileSave">Сохранить</button><button id="editProfileCancel">Отмена</button></div></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script>
  // ========== FIREBASE ==========
  const firebaseConfig = { apiKey: "AIzaSyAnw1Vz4Wzr2rmdrzVv5tga_x6u08ObNbA", authDomain: "renitea-b140f.firebaseapp.com", projectId: "renitea-b140f", storageBucket: "renitea-b140f.appspot.com", messagingSenderId: "806278733594", appId: "1:806278733594:web:d9887a35732173429f96a3" };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(), db = firebase.firestore(), storage = firebase.storage();

  async function compressImage(file, maxWidth=1080, quality=0.8) {
    return new Promise((res,rej)=>{ const reader=new FileReader(); reader.onload=e=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height; if(w>maxWidth){ h*=maxWidth/w; w=maxWidth; } const cvs=document.createElement('canvas'); cvs.width=w; cvs.height=h; cvs.getContext('2d').drawImage(img,0,0,w,h); cvs.toBlob(blob=>res(blob),'image/jpeg',quality); }; img.onerror=rej; img.src=e.target.result; }; reader.onerror=rej; reader.readAsDataURL(file); });
  }
  async function imageToBase64(blob){ return new Promise(r=>{ const fr=new FileReader(); fr.onload=()=>r(fr.result); fr.readAsDataURL(blob); }); }

  let currentUser=null, usersCache={}, posts=[], stiki=[], messages={}, postReactions={}, stikiReactions={}, currentChatUserId=null, viewProfileUserId=null;
  let unsubPosts, unsubStiki, unsubUsers, unsubMessages;

  function showScreen(name){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+name)?.classList.add('active'); document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(i=>{ i.classList.remove('active'); if(i.dataset.screen===name) i.classList.add('active'); }); }
  function chatKey(a,b){ return [a,b].sort().join('__'); }
  function formatTime(ts){ let d=ts?.toDate?.()||new Date(ts); return d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }

  async function ensureUserDoc(user){ let ref=db.collection('users').doc(user.uid); let snap=await ref.get(); if(!snap.exists) await ref.set({ email:user.email, name:user.email.split('@')[0], nick:'@'+user.email.split('@')[0], persona:'', bio:'', avatarBase64:'', followers:0, following:0 }); }

  function listenUsers(){ if(unsubUsers) unsubUsers(); unsubUsers=db.collection('users').onSnapshot(snap=>{ snap.docs.forEach(d=>{ usersCache[d.id]={id:d.id,...d.data()}; }); renderProfile(); renderPassport(); renderChatList(); renderRecommendations(); }); }
  function listenPosts(){ if(unsubPosts) unsubPosts(); unsubPosts=db.collection('posts').orderBy('createdAt','desc').onSnapshot(snap=>{ posts=snap.docs.map(d=>{ let data=d.data(); return { id:d.id, authorId:data.authorId, text:data.text||'', imageBase64:data.imageBase64||'', createdAt:data.createdAt, time:data.createdAt?formatTime(data.createdAt):'' }; }); renderFeed(); renderProfileGrid(); renderPassport(); }); }
  function listenStiki(){ if(unsubStiki) unsubStiki(); unsubStiki=db.collection('stiki').orderBy('createdAt','desc').onSnapshot(snap=>{ stiki=snap.docs.map(d=>{ let data=d.data(); return { id:d.id, authorId:data.authorId, videoURL:data.videoURL }; }); renderStiki(); }); }
  function listenMessagesForChat(uid, other){ let key=chatKey(uid,other); if(unsubMessages) unsubMessages(); unsubMessages=db.collection('chats').doc(key).collection('messages').orderBy('createdAt','asc').onSnapshot(snap=>{ messages[key]=snap.docs.map(d=>{ let data=d.data(); return { fromId:data.fromId, text:data.text, time:data.createdAt?formatTime(data.createdAt):'' }; }); renderChatList(); renderChatDialog(); }); }

  function renderFeed(){ let container=document.getElementById('feedList'); container.innerHTML=''; if(!posts.length){ document.getElementById('feedEmptyText').style.display='block'; return; } document.getElementById('feedEmptyText').style.display='none'; posts.forEach(p=>{ let reactions=postReactions[p.id]||{fire:0}; let author=usersCache[p.authorId]||{name:'Житель'}; let div=document.createElement('div'); div.className='feed-post'; div.innerHTML=`<div class="post-newspaper-header"><span class="post-author">${author.name||'Аноним'}</span><span class="post-date">${p.time}</span></div><div class="feed-post-image" data-zoom="false"><img src="${p.imageBase64||''}" alt=""></div><div class="feed-post-text">${p.text||''}</div><div class="post-actions-row"><button class="action-btn fire-btn" data-id="${p.id}">🔥</button><span class="action-count" id="fire-count-${p.id}">${reactions.fire||0}</span><button class="action-btn">💬</button><span class="action-count">0</span><button class="action-btn">✉️</button><span class="action-count"></span></div>`; container.appendChild(div); let imgDiv=div.querySelector('.feed-post-image'); imgDiv.addEventListener('click',()=>{ imgDiv.classList.toggle('zoomed'); }); let fireBtn=div.querySelector('.fire-btn'); fireBtn.addEventListener('click',(e)=>{ e.stopPropagation(); if(!postReactions[p.id])postReactions[p.id]={fire:0}; postReactions[p.id].fire+=1; renderFeed(); }); }); }
  function renderStiki(){ let wrap=document.getElementById('stikiWrapper'); if(!wrap)return; wrap.innerHTML=''; if(!stiki.length){ wrap.innerHTML='<div style="padding:20px;text-align:center;">🎬 Нет стиков</div>'; return; } stiki.forEach(s=>{ let reacts=stikiReactions[s.id]||{'🔥':0,'❤️':0}; let card=document.createElement('div'); card.className='stiki-card'; card.innerHTML=`<div class="stiki-video"><video src="${s.videoURL}" autoplay muted loop playsinline></video></div><div class="stiki-reactions"><div class="stiki-reaction" data-id="${s.id}" data-emoji="🔥">🔥 <span>${reacts['🔥']||0}</span></div><div class="stiki-reaction" data-id="${s.id}" data-emoji="❤️">❤️ <span>${reacts['❤️']||0}</span></div></div>`; wrap.appendChild(card); }); wrap.querySelectorAll('.stiki-reaction').forEach(el=>{ el.addEventListener('click',(e)=>{ e.stopPropagation(); let id=el.dataset.id, emoji=el.dataset.emoji; if(!stikiReactions[id])stikiReactions[id]={'🔥':0,'❤️':0}; stikiReactions[id][emoji]+=1; renderStiki(); }); }); }
  function renderProfile(){ if(!currentUser)return; let uid=viewProfileUserId||currentUser.uid; let u=usersCache[uid]; if(!u)return; document.getElementById('profileName').innerText=u.name||''; document.getElementById('profileNick').innerText=u.nick||''; document.getElementById('profileBio').innerText=u.bio||''; document.getElementById('profileAvatarImg').src=u.avatarBase64||''; let userPosts=posts.filter(p=>p.authorId===uid); document.getElementById('profilePostsCount').innerText=userPosts.length; if(uid===currentUser.uid){ document.getElementById('editProfileBtn').style.display='inline-block'; document.getElementById('profileMessageBtn').style.display='none'; }else{ document.getElementById('editProfileBtn').style.display='none'; document.getElementById('profileMessageBtn').style.display='inline-block'; } }
  function renderProfileGrid(){ let uid=viewProfileUserId||currentUser?.uid; let grid=document.getElementById('profileGrid'); if(!grid)return; grid.innerHTML=''; let userPosts=posts.filter(p=>p.authorId===uid); userPosts.forEach(p=>{ let item=document.createElement('div'); item.className='profile-grid-item'; if(p.imageBase64) item.innerHTML=`<img src="${p.imageBase64}">`; grid.appendChild(item); }); }
  function renderPassport(){ if(!currentUser)return; let u=usersCache[currentUser.uid]; if(!u)return; document.getElementById('passportName').innerText=u.name||'—'; document.getElementById('passportNick').innerText=u.nick||'—'; document.getElementById('passportPersona').innerText=u.persona||'—'; let photoDiv=document.getElementById('passportPhoto'); if(u.avatarBase64) photoDiv.style.backgroundImage=`url('${u.avatarBase64}')`; let myPosts=posts.filter(p=>p.authorId===currentUser.uid); document.getElementById('passportMomentsCount').innerText=myPosts.length; document.getElementById('visaGrid').innerHTML='<div class="visa-card">🌟 Виза доверия активна</div>'; }
  function renderChatList(filter=''){ if(!currentUser)return; let cont=document.getElementById('chatList'); cont.innerHTML=''; let list=Object.values(usersCache).filter(u=>u.id!==currentUser.uid); let q=filter.toLowerCase(); if(q) list=list.filter(u=>(u.name||'').toLowerCase().includes(q)||(u.nick||'').toLowerCase().includes(q)); list.forEach(u=>{ let key=chatKey(currentUser.uid,u.id); let msgs=messages[key]||[]; let last=msgs[msgs.length-1]; let div=document.createElement('div'); div.className='chat-item'+(currentChatUserId===u.id?' active':''); div.dataset.chatId=u.id; div.innerHTML=`<div class="chat-avatar">${u.avatarBase64?`<img src="${u.avatarBase64}">`:''}</div><div><div>${u.name||u.email}</div><div style="font-size:12px;">${last?last.text.substring(0,30):''}</div></div>`; div.addEventListener('click',()=>{ currentChatUserId=u.id; renderChatList(); listenMessagesForChat(currentUser.uid,currentChatUserId); }); cont.appendChild(div); }); if(currentChatUserId) listenMessagesForChat(currentUser.uid,currentChatUserId); }
  function renderChatDialog(){ if(!currentUser||!currentChatUserId)return; let other=usersCache[currentChatUserId]; if(!other)return; document.getElementById('chatDialogName').innerText=other.name||''; document.getElementById('chatDialogNick').innerText=other.nick||''; let avatarDiv=document.getElementById('chatDialogAvatar'); avatarDiv.innerHTML=other.avatarBase64?`<img src="${other.avatarBase64}" style="width:100%;height:100%;object-fit:cover;">`:''; let body=document.getElementById('chatDialogBody'); body.innerHTML=''; let key=chatKey(currentUser.uid,currentChatUserId); let msgs=messages[key]||[]; msgs.forEach(m=>{ let div=document.createElement('div'); div.className='msg '+(m.fromId===currentUser.uid?'me':'them'); div.innerHTML=`<div>${m.text}</div><div class="msg-time">${m.time}</div>`; body.appendChild(div); }); body.scrollTop=body.scrollHeight; }
  function renderRecommendations(){ let rec=document.getElementById('recommendationsList'); if(!rec)return; rec.innerHTML=''; Object.values(usersCache).filter(u=>u.id!==currentUser?.uid).slice(0,6).forEach(u=>{ let card=document.createElement('div'); card.style.padding='10px'; card.style.border='1px solid #e2d9ce'; card.style.borderRadius='20px'; card.style.marginBottom='8px'; card.style.cursor='pointer'; card.innerText=u.name||u.email; card.addEventListener('click',()=>{ viewProfileUserId=u.id; renderProfile(); renderProfileGrid(); showScreen('profile'); }); rec.appendChild(card); }); }

  async function afterLogin(user){ currentUser=user; viewProfileUserId=user.uid; await ensureUserDoc(user); document.getElementById('loginWrapper').style.display='none'; document.getElementById('appRoot').style.display='flex'; listenUsers(); listenPosts(); listenStiki(); currentChatUserId=null; renderChatList(); showScreen('posts'); }

  // ИСПРАВЛЕНА ЗАГРУЗКА АВАТАРА (работает)
  document.getElementById('loginBtn').addEventListener('click',async()=>{ try{ let cred=await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value,document.getElementById('loginPass').value); await afterLogin(cred.user); }catch(e){ document.getElementById('loginError').innerText=e.message; } });
  document.getElementById('registerBtn').addEventListener('click',async()=>{ let file=document.getElementById('regAvatar').files[0]; try{ let cred=await auth.createUserWithEmailAndPassword(document.getElementById('regEmail').value,document.getElementById('regPass').value); let avatarBase64=''; if(file){ let comp=await compressImage(file,200,0.7); avatarBase64=await imageToBase64(comp); } await db.collection('users').doc(cred.user.uid).set({ name:document.getElementById('regName').value, nick:document.getElementById('regNick').value, email:document.getElementById('regEmail').value, avatarBase64, bio:'', persona:'', followers:0, following:0 }); await afterLogin(cred.user); }catch(e){ document.getElementById('loginError').innerText=e.message; } });
  document.getElementById('feedPublishBtn').addEventListener('click',async()=>{ let text=document.getElementById('feedText').value, file=document.getElementById('feedImage').files[0]; if(!text||!file)return alert('Текст и фото'); let compressed=await compressImage(file,1080,0.8); let b64=await imageToBase64(compressed); await db.collection('posts').add({ authorId:currentUser.uid, text, imageBase64:b64, createdAt:firebase.firestore.FieldValue.serverTimestamp() }); document.getElementById('feedText').value=''; document.getElementById('feedImage').value=''; });
  document.getElementById('stikiPublishBtn').addEventListener('click',async()=>{ let file=document.getElementById('stikiInput').files[0]; if(!file)return; let ref=storage.ref().child(`stiki/${currentUser.uid}/${Date.now()}.mp4`); await ref.put(file); let url=await ref.getDownloadURL(); await db.collection('stiki').add({ authorId:currentUser.uid, videoURL:url, createdAt:firebase.firestore.FieldValue.serverTimestamp() }); document.getElementById('stikiInput').value=''; });
  document.getElementById('chatSendBtn').addEventListener('click',async()=>{ let text=document.getElementById('chatInput').value.trim(); if(!text||!currentChatUserId)return; let key=chatKey(currentUser.uid,currentChatUserId); await db.collection('chats').doc(key).set({user1:currentUser.uid,user2:currentChatUserId},{merge:true}); await db.collection('chats').doc(key).collection('messages').add({ fromId:currentUser.uid, toId:currentChatUserId, text, createdAt:firebase.firestore.FieldValue.serverTimestamp() }); document.getElementById('chatInput').value=''; });
  document.getElementById('editProfileBtn').addEventListener('click',()=>{ let u=usersCache[currentUser.uid]; document.getElementById('editProfileNameInput').value=u.name||''; document.getElementById('editProfileNickInput').value=u.nick||''; document.getElementById('editProfilePersonaInput').value=u.persona||''; document.getElementById('editProfileBioInput').value=u.bio||''; document.getElementById('editProfileModal').classList.add('active'); });
  document.getElementById('editProfileSave').addEventListener('click',async()=>{ let file=document.getElementById('editProfileAvatarInput').files[0]; let update={ name:document.getElementById('editProfileNameInput').value, nick:document.getElementById('editProfileNickInput').value, persona:document.getElementById('editProfilePersonaInput').value, bio:document.getElementById('editProfileBioInput').value }; if(file){ let comp=await compressImage(file,200,0.7); let b64=await imageToBase64(comp); update.avatarBase64=b64; } await db.collection('users').doc(currentUser.uid).update(update); document.getElementById('editProfileModal').classList.remove('active'); renderProfile(); renderPassport(); });
  document.getElementById('editProfileCancel').addEventListener('click',()=>document.getElementById('editProfileModal').classList.remove('active'));
  document.getElementById('logoutBtn').addEventListener('click',()=>auth.signOut());
  document.getElementById('profileMessageBtn').addEventListener('click',()=>{ if(viewProfileUserId && viewProfileUserId!==currentUser.uid){ currentChatUserId=viewProfileUserId; showScreen('chats'); listenMessagesForChat(currentUser.uid,currentChatUserId); } });
  document.getElementById('chatHeaderProfile').addEventListener('click',()=>{ if(currentChatUserId){ viewProfileUserId=currentChatUserId; renderProfile(); renderProfileGrid(); showScreen('profile'); } });
  document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(i=>i.addEventListener('click',()=>{ let scr=i.dataset.screen; if(scr==='profile'){ viewProfileUserId=currentUser.uid; renderProfile(); renderProfileGrid(); } showScreen(scr); }));
  document.getElementById('userSearch').addEventListener('input',e=>renderChatList(e.target.value));
  auth.onAuthStateChanged(user=>{ if(user) afterLogin(user); else { currentUser=null; document.getElementById('loginWrapper').style.display='flex'; document.getElementById('appRoot').style.display='none'; if(unsubPosts)unsubPosts(); if(unsubStiki)unsubStiki(); if(unsubMessages)unsubMessages(); if(unsubUsers)unsubUsers(); } });
</script>
</body>
</html>
