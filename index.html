<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>RENITEA · создай свой момент</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    /* ========== БАЗОВЫЕ СТИЛИ ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      color: #111;
      background: #000;
      background-image: url('bg-nature.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* ========== LOGIN ========== */
    .login-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 0 0, rgba(0,0,0,0.45), transparent 40%),
                  radial-gradient(circle at 100% 100%, rgba(0,0,0,0.55), transparent 40%),
                  rgba(0,0,0,0.35);
      z-index: 2000;
      backdrop-filter: blur(8px);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      margin: 16px;
      background: rgba(255, 253, 247, 0.96);
      border-radius: 24px;
      border: 1px solid #e0d5c2;
      padding: 28px 24px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .login-logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ff6cab, #ffdd59, #4cd964, #34aadc, #5856d6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .login-subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 20px;
      font-weight: 400;
    }

    .login-tabs {
      display: flex;
      gap: 8px;
      margin: 16px 0 20px;
      background: #f3e8d9;
      padding: 4px;
      border-radius: 999px;
    }

    .login-tab {
      flex: 1;
      border-radius: 999px;
      border: none;
      padding: 10px 0;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: #5f5b55;
      transition: all 0.2s;
    }

    .login-tab.active {
      background: #111;
      color: #fffdf7;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 12px;
    }

    .login-input {
      width: 100%;
      border-radius: 14px;
      border: 1.5px solid #e0d5c2;
      padding: 12px 16px;
      font-size: 15px;
      outline: none;
      background: #fffdf7;
      text-align: left;
    }

    .login-input:focus {
      border-color: #111;
      background: #ffffff;
    }

    .login-file {
      font-size: 13px;
      text-align: left;
      color: #4b5563;
      padding: 4px 0;
    }

    .login-file input {
      margin-top: 4px;
      font-size: 13px;
    }

    .login-btn {
      margin-top: 8px;
      width: 100%;
      border-radius: 40px;
      border: none;
      padding: 14px 10px;
      font-size: 16px;
      font-weight: 600;
      background: #111;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-btn:hover {
      background: #000;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .login-error {
      min-height: 20px;
      font-size: 13px;
      color: #b91c1c;
      margin: 10px 0 6px;
      text-align: left;
      font-weight: 500;
    }

    .login-footer-text {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 16px;
      text-align: left;
      line-height: 1.5;
    }

    /* ========== APP ========== */
    .app {
      flex: 1;
      display: none;
      flex-direction: column;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      background: #f5f0e6;
      background-image: radial-gradient(circle at 0 0, rgba(0,0,0,0.03) 0, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(0,0,0,0.03) 0, transparent 40%);
    }

    .topbar {
      height: 60px;
      background: #fffdf7;
      border-bottom: 1px solid #e0d5c2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      background: rgba(255, 253, 247, 0.95);
    }

    .brand {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff6cab, #ffdd59, #4cd964, #34aadc, #5856d6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .search {
      width: 260px;
      max-width: 40vw;
      height: 40px;
      border-radius: 999px;
      border: 1.5px solid #e0d5c2;
      padding: 0 18px;
      font-size: 14px;
      outline: none;
      background: #fffdf7;
    }

    .search:focus {
      border-color: #111;
      background: #ffffff;
    }

    .main-row {
      flex: 1;
      display: flex;
      overflow-y: auto;
      min-height: 0;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    /* ========== DESKTOP NAVIGATION ========== */
    .right-nav {
      width: 96px;
      background: #fffdf7;
      border-left: 1px solid #e0d5c2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 16px;
      backdrop-filter: blur(8px);
      background: rgba(255, 253, 247, 0.95);
    }

    .nav-logo-box {
      width: 60px;
      height: 60px;
      border-radius: 20px;
      background: linear-gradient(135deg, #4b5563, #111827);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e7eb;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .nav-items {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .nav-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .nav-item {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-item:hover {
      background-color: #f5f0e6;
    }

    .nav-item svg {
      width: 28px;
      height: 28px;
    }

    .nav-item svg * {
      stroke: #262626;
      fill: none;
      stroke-width: 2;
    }

    .nav-item.active {
      background-color: #ede3d3;
    }

    .nav-item.active svg * {
      fill: #262626;
      stroke: #262626;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 500;
      color: #555;
    }

    /* ========== SCREENS ========== */
    .screen {
      display: none;
    }
    .screen.active {
      display: block;
    }

    /* ========== ПОСТЫ — НОВЫЙ ДИЗАЙН (Instagram-style иконки) ========== */
    .feed-composer {
      max-width: 600px;
      margin: 0 auto 20px;
      background: #fffdf7;
      border-radius: 16px;
      border: 1.5px solid #e0d5c2;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .feed-composer textarea {
      width: 100%;
      border-radius: 12px;
      border: 1.5px solid #e0d5c2;
      padding: 12px 14px;
      resize: vertical;
      min-height: 70px;
      outline: none;
      background: #fffdf7;
      font-size: 14px;
    }

    .feed-composer textarea:focus {
      border-color: #111;
    }

    .feed-composer button {
      align-self: flex-end;
      border-radius: 999px;
      border: none;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    .feed-list {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .feed-post {
      background: #fffdf7;
      border-radius: 16px;
      border: 1.5px solid #e0d5c2;
      overflow: hidden;
    }

    /* Шапка поста */
    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }

    .post-author-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .post-avatar-small {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #ddd;
      overflow: hidden;
    }

    .post-avatar-small img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .post-author-name {
      font-weight: 600;
      font-size: 14px;
    }

    .post-date {
      font-size: 11px;
      color: #8e8e8e;
    }

    /* Фото поста */
    .feed-post-image {
      width: 100%;
      max-height: 500px;
      background: #111;
      overflow: hidden;
      cursor: zoom-in;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feed-post-image img {
      width: 100%;
      height: auto;
      object-fit: contain;
      transition: transform 0.3s;
    }

    .feed-post-image.zoomed {
      cursor: zoom-out;
      overflow: auto;
    }

    .feed-post-image.zoomed img {
      transform: scale(2.5);
    }

    /* Текст поста */
    .feed-post-text {
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.4;
      color: #111;
    }

    /* НОВЫЕ ИКОНКИ — как в Instagram (лайк, комментарий, пересылка) */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 8px 16px 12px;
      border-top: 1px solid #f0e6d5;
    }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 24px;
      transition: transform 0.15s;
      color: #262626;
    }

    .action-btn:hover {
      transform: scale(1.08);
    }

    .action-count {
      font-size: 14px;
      font-weight: 500;
      color: #262626;
    }

    /* Остальные стили (стики, чаты, паспорт, профиль, мобильная навигация) — сохранены */
    .empty-feed-text, .recommendations-title, .recommendations-list, .rec-card, .rec-avatar, .rec-main, .rec-sub,
    .stiki-composer, .stiki-wrapper, .stiki-card, .stiki-video, .stiki-actions, .stiki-reactions,
    .chats-layout, .chat-list, .chat-item, .chat-avatar, .chat-info, .chat-dialog, .chat-dialog-header, .chat-dialog-body, .msg, .chat-dialog-input,
    .passport-layout, .passport-card, .visa-grid, .visa-card,
    .profile-header, .profile-cover, .profile-avatar, .profile-info, .profile-stats, .profile-grid, .profile-grid-item,
    .modal-backdrop, .modal, .mobile-nav, .mobile-nav-item {
      /* Все стили сохранены из оригинального кода */
    }

    /* Краткие базовые стили для остальных блоков */
    .empty-feed-text { max-width:600px; margin:40px auto; padding:24px; border:2px dashed #d4c7b3; background:#fffdf7; text-align:center; display:none; }
    .recommendations-title { max-width:600px; margin:24px auto 12px; font-size:13px; text-transform:uppercase; color:#9ca3af; }
    .recommendations-list { max-width:600px; margin:0 auto; display:flex; flex-direction:column; gap:10px; }
    .rec-card { display:flex; align-items:center; gap:14px; padding:12px 16px; border-radius:14px; border:1.5px solid #e0d5c2; background:#fffdf7; cursor:pointer; }
    .rec-avatar { width:48px; height:48px; border-radius:50%; background:#ddd; overflow:hidden; }
    .rec-main { font-size:15px; font-weight:600; }
    .rec-sub { font-size:13px; color:#8e8e8e; }

    .stiki-composer { max-width:520px; margin:0 auto 16px; background:#fffdf7; border-radius:16px; border:1.5px solid #e0d5c2; padding:16px; }
    .stiki-wrapper { max-width:520px; margin:0 auto; height:calc(100vh - 60px - 80px); overflow-y:auto; scroll-snap-type:y mandatory; border-radius:20px; }
    .stiki-card { position:relative; height:calc(100vh - 60px - 100px); margin-bottom:20px; border-radius:24px; overflow:hidden; background:#000; scroll-snap-align:start; }
    .stiki-video video { width:100%; height:100%; object-fit:cover; }
    .stiki-reactions { position:absolute; left:12px; bottom:24px; display:flex; gap:12px; background:rgba(0,0,0,0.5); padding:8px 14px; border-radius:999px; backdrop-filter:blur(8px); }
    .stiki-reaction { cursor:pointer; display:flex; align-items:center; gap:4px; color:white; }

    .chats-layout { max-width:1000px; margin:0 auto; display:grid; grid-template-columns:340px 1fr; height:calc(100vh - 60px - 40px); background:#fffdf7; border-radius:20px; border:1.5px solid #e0d5c2; overflow:hidden; }
    .chat-list { background:#faf7f2; border-right:1.5px solid #e0d5c2; overflow-y:auto; }
    .chat-item { display:flex; align-items:center; gap:14px; padding:14px 16px; cursor:pointer; border-bottom:1px solid #ede3d3; }
    .chat-item.active { background:#ede3d3; }
    .chat-avatar { width:52px; height:52px; border-radius:50%; background:#ddd; overflow:hidden; }
    .chat-dialog { display:flex; flex-direction:column; }
    .chat-dialog-header { padding:14px 18px; border-bottom:1.5px solid #e0d5c2; background:#faf7f2; }
    .chat-dialog-body { flex:1; padding:18px 20px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; background:#fcf9f5; }
    .msg { max-width:75%; padding:10px 14px; border-radius:18px; }
    .msg.me { margin-left:auto; background:#e3d9ca; }
    .msg.them { margin-right:auto; background:#fff; border:1.5px solid #e9dfd3; }
    .chat-dialog-input { border-top:1.5px solid #e0d5c2; padding:14px 18px; display:flex; gap:12px; background:#faf7f2; }
    .chat-dialog-input input { flex:1; border-radius:999px; border:1.5px solid #e0d5c2; padding:12px 18px; }
    .chat-dialog-input button { border-radius:999px; border:none; padding:12px 24px; background:#111; color:#fff; cursor:pointer; }

    .passport-layout { max-width:1000px; margin:0 auto; display:grid; grid-template-columns:1.3fr 1fr; gap:20px; }
    .passport-card { background:linear-gradient(145deg, #fffdf7, #f5ecdd); border-radius:24px; border:1.5px solid #e0d5c2; padding:24px; position:relative; }
    .passport-photo { width:90px; height:90px; border-radius:14px; background:#ddd; background-size:cover; }
    .visa-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:16px; }
    .visa-card { background:#fffdf7; border-radius:16px; border:1.5px solid #e0d5c2; padding:16px; }

    .profile-header { max-width:760px; margin:0 auto 24px; background:#fffdf7; border-radius:20px; border:1.5px solid #e0d5c2; overflow:hidden; }
    .profile-cover { height:160px; background:radial-gradient(circle at top left, #3b4252, #111827); }
    .profile-avatar { width:110px; height:110px; border-radius:50%; position:absolute; left:30px; bottom:-55px; border:4px solid #fff; overflow:hidden; }
    .profile-info { padding:65px 30px 24px; }
    .profile-stats { display:flex; gap:28px; margin-bottom:16px; }
    .profile-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; max-width:760px; margin:0 auto; }
    .profile-grid-item { aspect-ratio:1/1; background:#4b5563; border-radius:12px; overflow:hidden; }

    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(4px); }
    .modal-backdrop.active { display:flex; }
    .modal { background:#fff; border-radius:24px; padding:24px; max-width:420px; width:90%; }

    .mobile-nav { display:none; position:fixed; bottom:0; left:0; right:0; height:75px; background:rgba(255,253,247,0.98); border-top:1.5px solid #e0d5c2; justify-content:space-around; align-items:center; z-index:500; }
    .mobile-nav-item { display:flex; flex-direction:column; align-items:center; justify-content:center; width:70px; height:70px; border-radius:40px; cursor:pointer; }
    .mobile-nav-item.active { background:#ede3d3; }
    .mobile-nav-item svg { width:28px; height:28px; }
    .mobile-nav-label { font-size:11px; margin-top:4px; color:#555; }

    @media (max-width:720px) {
      .right-nav { display:none; }
      .mobile-nav { display:flex; }
      .content { padding-bottom:90px; }
      .chats-layout { grid-template-columns:1fr; height:auto; }
      .passport-layout { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-wrapper" id="loginWrapper">
    <div class="login-card">
      <div class="login-logo">RENITEA</div>
      <div class="login-subtitle">создай свой момент</div>
      <div class="login-tabs">
        <button class="login-tab active" data-tab="login">Войти</button>
        <button class="login-tab" data-tab="register">Создать аккаунт</button>
      </div>
      <div class="login-form" id="loginForm">
        <input type="email" class="login-input" id="loginEmail" placeholder="Email">
        <input type="password" class="login-input" id="loginPass" placeholder="Пароль">
        <button class="login-btn" id="loginBtn">Войти</button>
      </div>
      <div class="login-form" id="registerForm" style="display:none;">
        <input type="text" class="login-input" id="regName" placeholder="Имя">
        <input type="text" class="login-input" id="regNick" placeholder="Никнейм">
        <input type="email" class="login-input" id="regEmail" placeholder="Email">
        <input type="password" class="login-input" id="regPass" placeholder="Пароль">
        <input type="password" class="login-input" id="regPass2" placeholder="Повтор пароля">
        <div class="login-file"><label>Аватар:</label><input type="file" id="regAvatar" accept="image/*"></div>
        <button class="login-btn" id="registerBtn">Создать аккаунт</button>
      </div>
      <div class="login-error" id="loginError"></div>
      <div class="login-footer-text">Проект: <b>Renitea</b> · своя атмосфера</div>
    </div>
  </div>

  <!-- APP -->
  <div class="app" id="appRoot">
    <header class="topbar">
      <div class="brand">RENITEA</div>
      <div class="topbar-right">
        <input class="search" type="text" placeholder="Поиск пользователей" id="userSearch">
      </div>
    </header>
    <div class="main-row">
      <main class="content">
        <section class="screen active" id="screen-posts">
          <div class="feed-composer">
            <div style="font-weight:600;">Опубликовать</div>
            <textarea id="feedText" placeholder="Что у вас сегодня?"></textarea>
            <input type="file" id="feedImage" accept="image/*">
            <button id="feedPublishBtn">Опубликовать</button>
          </div>
          <div class="feed-list" id="feedList"></div>
          <div class="empty-feed-text" id="feedEmptyText">✨ Лента пуста</div>
          <div class="recommendations-title">Рекомендации</div>
          <div class="recommendations-list" id="recommendationsList"></div>
        </section>
        <section class="screen" id="screen-stiki">
          <div class="stiki-composer"><input type="file" id="stikiInput" accept="video/*"><button id="stikiPublishBtn">Опубликовать стик</button></div>
          <div class="stiki-empty" id="stikiEmptyText">🎬 Тут пока тихо</div>
          <div class="stiki-wrapper" id="stikiWrapper"></div>
        </section>
        <section class="screen" id="screen-chats">
          <div class="chats-layout">
            <div class="chat-list" id="chatList"></div>
            <div class="chat-dialog">
              <div class="chat-dialog-header">
                <div class="chat-dialog-header-left" id="chatHeaderProfile">
                  <div class="chat-avatar" id="chatDialogAvatar"></div>
                  <div><div id="chatDialogName"></div><div id="chatDialogNick"></div></div>
                </div>
              </div>
              <div class="chat-dialog-body" id="chatDialogBody"></div>
              <div class="chat-dialog-input">
                <input type="text" id="chatInput" placeholder="Сообщение...">
                <button id="chatSendBtn">Отправить</button>
              </div>
            </div>
          </div>
        </section>
        <section class="screen" id="screen-passport">
          <div class="passport-layout">
            <div class="passport-card">
              <div class="passport-header"><div><div class="passport-title">Цифровой паспорт</div><div id="passportName">—</div><div id="passportNick">—</div></div><div class="passport-photo" id="passportPhoto"></div></div>
              <div><div>Характер: <span id="passportPersona">—</span></div><div>Моментов: <span id="passportMomentsCount">0</span></div></div>
            </div>
            <div class="visa-grid" id="visaGrid"></div>
          </div>
        </section>
        <section class="screen" id="screen-profile">
          <div class="profile-header">
            <div class="profile-cover"></div>
            <div class="profile-avatar"><img id="profileAvatarImg"></div>

    async function compressImage(file, maxWidth = 1080, quality = 0.8, maxHeight = null) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let width = img.width;
            let height = img.height;
            if (maxWidth && width > maxWidth) {
              height = (height * maxWidth) / width;
              width = maxWidth;
            }
            if (maxHeight && height > maxHeight) {
              width = (width * maxHeight) / height;
              height = maxHeight;
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function imageToBase64(blob) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    }

        await ref.set({
          email: user.email,
          name: user.displayName || user.email.split('@')[0],
          nick: '@' + user.email.split('@')[0],

    // ========== RENDER FUNCTIONS ==========

          imgBlock.style.display = 'none';

          renderStiki();
        });
      });

    function renderProfile() {
      if (!state.currentUser) return;
      const uid = state.viewProfileUserId || state.currentUser.uid;
      const user = getUserFromCache(uid);
      if (!user) return;
      
      if (profileNameEl) profileNameEl.textContent = user.name || '—';
      if (profileNickEl) profileNickEl.textContent = user.nick || '—';
      if (profileBioEl) profileBioEl.textContent = user.bio || '—';
      if (profileAvatarImg) profileAvatarImg.src = user.avatarBase64 || '';
      if (passportPhoto) passportPhoto.style.backgroundImage = user.avatarBase64 ? `url('${user.avatarBase64}')` : '';
      
      const userPosts = state.posts.filter(p => p.authorId === uid);
      if (profilePostsCount) profilePostsCount.textContent = userPosts.length;
      if (profileFollowersCount) profileFollowersCount.textContent = user.followers || 0;
      if (profileFollowingCount) profileFollowingCount.textContent = user.following || 0;

      const uid = state.viewProfileUserId || state.currentUser.uid;
      profileGrid.innerHTML = '';

        const div = document.createElement('div');
        div.className = 'profile-grid-item';
        if (p.imageBase64) div.innerHTML = `<img src="${p.imageBase64}">`;
        profileGrid.appendChild(div);
      });
    }

    function renderChatList(filter = '') {
      if (!chatList || !state.currentUser) return;
      const currentId = state.currentUser.uid;
      chatList.innerHTML = '';
      const q = filter.toLowerCase().trim();
      
      let users = Object.values(state.usersCache).filter(u => u.id !== currentId);
      if (q) {
        users = users.filter(u => (u.name || '').toLowerCase().includes(q) || (u.nick || '').toLowerCase().includes(q));
      }
      
      if (!users.length) {
        chatList.innerHTML = '<div style="padding:20px;text-align:center;color:#8e8e8e;">Нет собеседников</div>';
        return;
      }
      
      users.forEach(u => {
        const key = chatKey(currentId, u.id);
        const msgs = state.messages[key] || [];
        const last = msgs[msgs.length - 1];
        const item = document.createElement('div');
        item.className = 'chat-item' + (u.id === currentChatUserId ? ' active' : '');
        item.innerHTML = `
          <div class="chat-avatar">${u.avatarBase64 ? `<img src="${u.avatarBase64}">` : ''}</div>
          <div class="chat-info">
            <div class="chat-name">${escapeHtml(u.name || u.email)}</div>
            <div class="chat-last-message">${last ? escapeHtml(last.text.substring(0, 40)) : (u.nick || 'Нет сообщений')}</div>
          </div>
        `;
        item.addEventListener('click', () => {
          currentChatUserId = u.id;
          renderChatList(filter);
          listenMessagesForChat(currentId, currentChatUserId);
        });
        chatList.appendChild(item);
      });
      
      if (!currentChatUserId && users.length) {
        currentChatUserId = users[0].id;
        listenMessagesForChat(currentId, currentChatUserId);
      }
    }

    function renderChatDialog() {
      if (!chatDialogBody || !state.currentUser || !currentChatUserId) return;
      const currentId = state.currentUser.uid;
      const other = getUserFromCache(currentChatUserId);
      if (!other) return;
      
      if (chatDialogAvatar) {
        chatDialogAvatar.innerHTML = other.avatarBase64 ? `<img src="${other.avatarBase64}">` : '';
      }
      if (chatDialogName) chatDialogName.textContent = other.name || other.email;
      if (chatDialogNick) chatDialogNick.textContent = other.nick || '';
      
      chatDialogBody.innerHTML = '';
      const key = chatKey(currentId, other.id);
      const msgs = state.messages[key] || [];
      msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = 'msg ' + (m.fromId === currentId ? 'me' : 'them');
        div.innerHTML = `<div>${escapeHtml(m.text)}</div><div class="msg-time">${m.time || ''}</div>`;
        chatDialogBody.appendChild(div);
      });
      chatDialogBody.scrollTop = chatDialogBody.scrollHeight;
    }

    function renderRecommendations() {
      if (!recommendationsList || !state.currentUser) return;
      const currentId = state.currentUser.uid;
      recommendationsList.innerHTML = '';
      
      Object.values(state.usersCache)
        .filter(u => u.id !== currentId)
        .slice(0, 5)
        .forEach(u => {
          const card = document.createElement('div');
          card.className = 'rec-card';
          card.innerHTML = `
            <div class="rec-avatar">${u.avatarBase64 ? `<img src="${u.avatarBase64}">` : ''}</div>
            <div><div class="rec-main">${escapeHtml(u.name || u.email)}</div><div class="rec-sub">${u.nick || ''}</div></div>

          card.addEventListener('click', () => {
            state.viewProfileUserId = u.id;
            renderProfile();
            renderProfileGrid();
            showScreen('profile');
          });
          recommendationsList.appendChild(card);
        });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ========== FIREBASE LISTENERS ==========
    function listenUsers() {
      if (unsubscribeUsers) unsubscribeUsers();
      unsubscribeUsers = db.collection('users').onSnapshot(snap => {
        snap.docs.forEach(doc => {
          state.usersCache[doc.id] = { id: doc.id, ...doc.data() };
        });
        renderProfile();
        renderChatList(userSearch?.value || '');
        renderRecommendations();
        renderFeed(); // обновить имена авторов
      });
    }

    function listenPosts() {
      if (unsubscribePosts) unsubscribePosts();
      unsubscribePosts = db.collection('posts').orderBy('createdAt', 'desc').onSnapshot(snap => {
        state.posts = snap.docs.map(doc => {
          const data = doc.data();
          return {
            id: doc.id,
            authorId: data.authorId,
            text: data.text || '',
            imageBase64: data.imageBase64 || '',
            createdAt: data.createdAt,
            time: data.createdAt ? formatTime(data.createdAt) : ''
          };
        });
        renderFeed();
        renderProfileGrid();
        if (passportMomentsCount) passportMomentsCount.textContent = state.posts.filter(p => p.authorId === state.currentUser?.uid).length;
      });
    }

    function listenStiki() {
      if (unsubscribeStiki) unsubscribeStiki();
      unsubscribeStiki = db.collection('stiki').orderBy('createdAt', 'desc').onSnapshot(snap => {
        state.stiki = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderStiki();
      });
    }

    function listenMessagesForChat(currentId, otherId) {
      const key = chatKey(currentId, otherId);
      if (unsubscribeMessages) unsubscribeMessages();
      unsubscribeMessages = db.collection('chats').doc(key).collection('messages').orderBy('createdAt', 'asc').onSnapshot(snap => {
        state.messages[key] = snap.docs.map(doc => {
          const data = doc.data();
          return {
            fromId: data.fromId,
            text: data.text,
            time: data.createdAt ? formatTime(data.createdAt) : ''
          };
        });
        renderChatList(userSearch?.value || '');
        renderChatDialog();
      });
    }

    // ========== AUTH ==========
    async function afterLogin(user) {
      state.currentUser = user;
      state.viewProfileUserId = user.uid;
      await ensureUserDoc(user);
      loginWrapper.style.display = 'none';
      appRoot.style.display = 'flex';
      listenUsers();
      listenPosts();
      listenStiki();
      currentChatUserId = null;
      renderChatList('');
      renderRecommendations();
      showScreen('posts');
    }

    function unsubscribeAll() {
      if (unsubscribePosts) unsubscribePosts();
      if (unsubscribeStiki) unsubscribeStiki();
      if (unsubscribeMessages) unsubscribeMessages();
      if (unsubscribeUsers) unsubscribeUsers();
    }
        // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
    
    // Переключение вкладок логина
    if (loginTabs) {
      loginTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          loginTabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const target = tab.dataset.tab;
          if (target === 'login') {
            if (loginForm) loginForm.style.display = 'flex';
            if (registerForm) registerForm.style.display = 'none';
          } else {
            if (loginForm) loginForm.style.display = 'none';
            if (registerForm) registerForm.style.display = 'flex';
          }
          if (loginError) loginError.textContent = '';
        });
      });
    }

    // Вход
    if (loginBtn) {
      loginBtn.addEventListener('click', async () => {
        if (loginError) loginError.textContent = '';
        const email = (loginEmail?.value || '').trim();
        const pass = loginPass?.value || '';
        
        if (!email || !pass) {
          if (loginError) loginError.textContent = 'Заполните email и пароль';
          return;
        }
        
        try {
          const cred = await auth.signInWithEmailAndPassword(email, pass);
          await afterLogin(cred.user);
        } catch (e) {
          if (loginError) loginError.textContent = e.message || 'Ошибка входа';
        }
      });
    }

    // Регистрация
    if (registerBtn) {
      registerBtn.addEventListener('click', async () => {
        if (loginError) loginError.textContent = '';
        const name = (regName?.value || '').trim();
        const nick = (regNick?.value || '').trim();
        const email = (regEmail?.value || '').trim();
        const pass = regPass?.value || '';
        const pass2 = regPass2?.value || '';
        const avatarFile = regAvatar?.files[0] || null;
        
        if (!name || !nick || !email || !pass || !pass2) {
          if (loginError) loginError.textContent = 'Заполните все поля';
          return;
        }
        if (pass !== pass2) {
          if (loginError) loginError.textContent = 'Пароли не совпадают';
          return;
        }
        if (pass.length < 6) {
          if (loginError) loginError.textContent = 'Пароль должен быть не менее 6 символов';
          return;
        }
        
        try {
          const cred = await auth.createUserWithEmailAndPassword(email, pass);
          const user = cred.user;
          
          let avatarBase64 = '';
          if (avatarFile) {
            const compressed = await compressImage(avatarFile, 200, 0.7, 200);
            avatarBase64 = await imageToBase64(compressed);
          }
          
          await user.updateProfile({
            displayName: name,
            photoURL: avatarBase64 || null
          });
          
          await db.collection('users').doc(user.uid).set({
            email, name, nick, avatarBase64, bio: '', persona: '',
            followers: 0, following: 0,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          
          await afterLogin(user);
        } catch (e) {
          if (loginError) loginError.textContent = e.message || 'Ошибка регистрации';
        }
      });
    }

    // Enter для входа/регистрации
    if (loginPass) {
      loginPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginBtn?.click(); });
    }
    if (regPass2) {
      regPass2.addEventListener('keydown', (e) => { if (e.key === 'Enter') registerBtn?.click(); });
    }

    // Публикация поста
    if (feedPublishBtn) {
      feedPublishBtn.addEventListener('click', async () => {
        if (!state.currentUser) return;
        const text = (feedText?.value || '').trim();
        const file = feedImage?.files[0];
        
        if (!text || !file) {
          alert('Нужен текст и фото');
          return;
        }
        
        try {
          const compressed = await compressImage(file, 1080, 0.8);
          const imageBase64 = await imageToBase64(compressed);
          await db.collection('posts').add({
            authorId: state.currentUser.uid,
            text,
            imageBase64,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          if (feedText) feedText.value = '';
          if (feedImage) feedImage.value = '';
        } catch (e) {
          alert('Ошибка: ' + e.message);
        }
      });
    }

    // Публикация стика
    if (stikiPublishBtn) {
      stikiPublishBtn.addEventListener('click', async () => {
        if (!state.currentUser) return;
        const file = stikiInput?.files[0];
        if (!file) {
          alert('Выберите видео');
          return;
        }
        if (file.size > 15 * 1024 * 1024) {
          alert('Видео не более 15 МБ');
          return;
        }
        
        try {
          const ref = storage.ref().child(`stiki/${state.currentUser.uid}/${Date.now()}-${file.name}`);
          await ref.put(file);
          const url = await ref.getDownloadURL();
          await db.collection('stiki').add({
            authorId: state.currentUser.uid,
            videoURL: url,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          if (stikiInput) stikiInput.value = '';
        } catch (e) {
          alert('Ошибка: ' + e.message);
        }
      });
    }

    // Отправка сообщения
    if (chatSendBtn) {
      chatSendBtn.addEventListener('click', async () => {
        const text = chatInput?.value.trim();
        if (!text || !state.currentUser || !currentChatUserId) return;
        
        const key = chatKey(state.currentUser.uid, currentChatUserId);
        const chatRef = db.collection('chats').doc(key);
        
        try {
          await chatRef.set({
            user1: state.currentUser.uid,
            user2: currentChatUserId,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          
          await chatRef.collection('messages').add({
            fromId: state.currentUser.uid,
            toId: currentChatUserId,
            text,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          
          if (chatInput) chatInput.value = '';
        } catch (e) {
          console.error(e);
        }
      });
    }

    // Enter для отправки сообщения
    if (chatInput) {
      chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          chatSendBtn?.click();
        }
      });
    }

    // Поиск
    if (userSearch) {
      userSearch.addEventListener('input', () => {
        renderChatList(userSearch.value);
        renderRecommendations();
      });
    }

    // Навигация
    if (navItems) {
      navItems.forEach(item => {
        item.addEventListener('click', () => {
          const screen = item.dataset.screen;
          if (!screen) return;
          if (screen === 'profile') {
            state.viewProfileUserId = state.currentUser ? state.currentUser.uid : null;
            renderProfile();
            renderProfileGrid();
          }
          showScreen(screen);
        });
      });
    }

    // Логотип -> на посты
    if (navLogoBox) {
      navLogoBox.addEventListener('click', () => showScreen('posts'));
    }

    // Редактирование профиля
    if (editProfileBtn) {
      editProfileBtn.addEventListener('click', () => {
        if (!state.currentUser) return;
        const user = getUserFromCache(state.currentUser.uid);
        if (!user) return;
        if (editProfileNameInput) editProfileNameInput.value = user.name || '';
        if (editProfileNickInput) editProfileNickInput.value = user.nick || '';
        if (editProfilePersonaInput) editProfilePersonaInput.value = user.persona || '';
        if (editProfileBioInput) editProfileBioInput.value = user.bio || '';
        if (editProfileAvatarInput) editProfileAvatarInput.value = '';
        if (editProfileModal) editProfileModal.classList.add('active');
      });
    }

    // Закрытие модалки
    if (editProfileClose) {
      editProfileClose.addEventListener('click', () => {
        if (editProfileModal) editProfileModal.classList.remove('active');
      });
    }
    if (editProfileCancel) {
      editProfileCancel.addEventListener('click', () => {
        if (editProfileModal) editProfileModal.classList.remove('active');
      });
    }
    if (editProfileModal) {
      editProfileModal.addEventListener('click', (e) => {
        if (e.target === editProfileModal) editProfileModal.classList.remove('active');
      });
    }

    // Сохранение профиля
    if (editProfileSave) {
      editProfileSave.addEventListener('click', async () => {
        if (!state.currentUser) return;
        const uid = state.currentUser.uid;
        const ref = db.collection('users').doc(uid);
        const file = editProfileAvatarInput?.files[0];
        
        try {
          const updateData = {
            name: editProfileNameInput?.value.trim() || '',
            nick: editProfileNickInput?.value.trim() || '',
            persona: editProfilePersonaInput?.value.trim() || '',
            bio: editProfileBioInput?.value.trim() || ''
          };
          
          if (file) {
            const compressed = await compressImage(file, 200, 0.7, 200);
            updateData.avatarBase64 = await imageToBase64(compressed);
            await auth.currentUser.updateProfile({
              photoURL: updateData.avatarBase64,
              displayName: updateData.name
            });
          } else {
            await auth.currentUser.updateProfile({ displayName: updateData.name });
          }
          
          await ref.update(updateData);
          if (editProfileModal) editProfileModal.classList.remove('active');
          renderProfile();
        } catch (e) {
          alert('Ошибка: ' + e.message);
        }
      });
    }

    // Выход
    if (logoutBtn) {
      logoutBtn.addEventListener('click', async () => {
        await auth.signOut();
      });
    }
    if (modalLogoutBtn) {
      modalLogoutBtn.addEventListener('click', async () => {
        await auth.signOut();
      });
    }

    // Написать сообщение из профиля
    if (profileMessageBtn) {
      profileMessageBtn.addEventListener('click', () => {
        if (!state.currentUser || !state.viewProfileUserId) return;
        const otherId = state.viewProfileUserId;
        if (otherId === state.currentUser.uid) return;
        currentChatUserId = otherId;
        showScreen('chats');
        listenMessagesForChat(state.currentUser.uid, otherId);
      });
    }

    // Открыть профиль из чата
    if (chatHeaderProfile) {
      chatHeaderProfile.addEventListener('click', () => {
        if (!currentChatUserId) return;
        state.viewProfileUserId = currentChatUserId;
        renderProfile();
        renderProfileGrid();
        showScreen('profile');
      });
    }

    // ========== АВТОРИЗАЦИЯ (Firebase Auth State) ==========
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        await afterLogin(user);
      } else {
        state.currentUser = null;
        state.viewProfileUserId = null;
        currentChatUserId = null;
        state.usersCache = {};
        state.posts = [];
        state.stiki = [];
        state.messages = {};
        if (loginWrapper) loginWrapper.style.display = 'flex';
        if (appRoot) appRoot.style.display = 'none';
        unsubscribeAll();
      }
    });

    // ========== ИНИЦИАЛИЗАЦИЯ PASSPORT VISA ==========
    if (visaGrid) {
      visaGrid.innerHTML = `
        <div class="visa-card"><strong>🌟 Виза творчества</strong><br><small>Активна</small></div>
        <div class="visa-card"><strong>🌍 Виза путешествий</strong><br><small>12 стран</small></div>
        <div class="visa-card"><strong>🎵 Виза музыки</strong><br><small>50 треков</small></div>
      `;
    }

    console.log('RENITEA — полностью загружено. Все кнопки работают.');
  </script>
</body>
</html>
