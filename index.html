<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealReel · Stories + Reels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-frame {
            width: 380px;
            height: 720px;
            background: #000;
            overflow: hidden;
            position: relative;
            border-radius: 0;
        }

        /* ===== ТЕМНА ТЕМА ===== */
        :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --surface-hover: #2c2c2e;
            --text: #ffffff;
            --text-secondary: #98989e;
            --accent: #9b59b6;
            --border: #2c2c2e;
        }

        /* Верхня навігація */
        .top-nav {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 22px;
            color: var(--accent);
        }

        .version {
            font-size: 11px;
            background: var(--surface);
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--text-secondary);
            margin-left: 8px;
        }

        .daily {
            background: var(--surface);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            color: var(--text);
        }

        .nav-icons {
            display: flex;
            gap: 16px;
        }

        .nav-icon {
            width: 36px;
            height: 36px;
            background: var(--surface);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .nav-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
        }

        .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #ff3b30;
            color: white;
            font-size: 10px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== STORIES ===== */
        .stories-container {
            padding: 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .stories {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .stories::-webkit-scrollbar {
            display: none;
        }

        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 70px;
            cursor: pointer;
        }

        .story-avatar {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background-size: cover;
            background-position: center;
            border: 3px solid var(--accent);
        }

        .story-avatar.no-story {
            border-color: var(--border);
        }

        .story-add {
            width: 70px;
            height: 70px;
            background: var(--surface);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: var(--accent);
            border: 2px dashed var(--accent);
        }

        .story-name {
            font-size: 12px;
            color: var(--text-secondary);
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ===== REELS ===== */
        .reels-container {
            height: calc(100vh - 140px);
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }

        .reel {
            height: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
            color: white;
            z-index: 10;
        }

        .reel-author {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .reel-avatar {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
        }

        .reel-actions {
            position: absolute;
            right: 10px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
        }

        .reel-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-size: 12px;
        }

        .reel-action svg {
            width: 28px;
            height: 28px;
            stroke: white;
            fill: none;
            margin-bottom: 4px;
        }

        .reel-action.liked svg {
            fill: #ff3b30;
            stroke: #ff3b30;
        }

        /* ===== НИЖНЯ НАВІГАЦІЯ ===== */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            background: var(--bg);
            border-top: 1px solid var(--border);
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 10px;
            flex: 1;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            margin-bottom: 2px;
        }

        /* ===== ІНШІ ЕКРАНИ ===== */
        .screen {
            display: none;
            height: 100%;
            background: var(--bg);
        }

        .screen.active {
            display: block;
        }

        /* Профіль */
        .profile-screen {
            padding: 16px;
            height: 100%;
            overflow-y: auto;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            background-size: cover;
            background-position: center;
            border: 3px solid var(--accent);
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .profile-nick {
            color: var(--text-secondary);
        }

        .profile-bio {
            background: var(--surface);
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
            color: var(--text);
        }

        .profile-stats {
            display: flex;
            gap: 20px;
            margin: 16px 0;
        }

        .profile-stat {
            text-align: center;
            cursor: pointer;
            color: var(--text);
        }

        .profile-stat-value {
            font-weight: 700;
            font-size: 18px;
        }

        .profile-stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .profile-actions {
            display: flex;
            gap: 10px;
            margin: 16px 0;
        }

        .profile-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 30px;
            cursor: pointer;
        }

        .profile-btn.primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }

        .post-thumb {
            aspect-ratio: 1;
            background: var(--surface);
        }

        /* Модалки */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
            z-index: 1000;
            display: none;
            color: var(--text);
        }

        .modal.active {
            display: block;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            margin-bottom: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: var(--surface-hover);
            color: var(--text);
            cursor: pointer;
        }

        .modal-btn.save {
            background: var(--accent);
            color: white;
        }

        /* Завантаження */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loading-screen.hidden {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--surface);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* Аватарки */
        .avatar-default {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23666"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
        }
        .avatar-1 { background-image: url('https://api.dicebear.com/7.x/adventurer/svg?seed=user1'); }
        .avatar-2 { background-image: url('https://api.dicebear.com/7.x/adventurer/svg?seed=user2'); }
        .avatar-3 { background-image: url('https://api.dicebear.com/7.x/adventurer/svg?seed=user3'); }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Завантаження -->
        <div class="loading-screen" id="loadingScreen">
            <div class="spinner"></div>
        </div>

        <!-- Шапка -->
        <div class="top-nav">
            <div style="display: flex; align-items: center;">
                <span class="logo">RealReel</span>
                <span class="version">v8.0</span>
            </div>
            <div class="daily" id="dailyFeature" onclick="changeDailyFeature()">🔥</div>
            <div class="nav-icons">
                <div class="nav-icon" onclick="openAddPostModal()">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                </div>
                <div class="nav-icon" onclick="toggleNotifications()">
                    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <span class="badge" id="notificationBadge" style="display: none;">0</span>
                </div>
            </div>
        </div>

        <!-- ОСНОВНИЙ ЕКРАН: STORIES + REELS -->
        <div class="screen active" id="reelsScreen">
            <div class="stories-container">
                <div class="stories" id="stories">
                    <!-- Додається через JS -->
                </div>
            </div>
            <div class="reels-container" id="reelsContainer">
                <!-- Додається через JS -->
            </div>
        </div>

        <!-- Профіль -->
        <div class="screen" id="profileScreen">
            <div class="profile-screen">
                <div class="profile-header">
                    <div class="profile-avatar avatar-default" id="profileAvatar" onclick="document.getElementById('avatarFile').click()"></div>
                    <input type="file" id="avatarFile" accept="image/*" style="display: none;">
                    <div>
                        <div class="profile-name" id="profileFullName">Завантаження...</div>
                        <div class="profile-nick" id="profileNick">@...</div>
                    </div>
                </div>
                <div class="profile-bio" id="profileBio">...</div>
                <div class="profile-stats">
                    <div class="profile-stat" onclick="showSubscriptions('followers')">
                        <div class="profile-stat-value" id="profileFollowersCount">0</div>
                        <div class="profile-stat-label">підписники</div>
                    </div>
                    <div class="profile-stat" onclick="showSubscriptions('following')">
                        <div class="profile-stat-value" id="profileFollowingCount">0</div>
                        <div class="profile-stat-label">підписки</div>
                    </div>
                </div>
                <div class="profile-actions">
                    <button class="profile-btn primary" id="profileMessageBtn">Написати</button>
                    <button class="profile-btn secondary" id="profileSubscribeBtn">Підписатися</button>
                </div>
                <div class="posts-grid" id="userPostsGrid"></div>
                <div style="padding: 20px; text-align: center; color: var(--text-secondary); cursor: pointer;" onclick="logout()">Вийти</div>
            </div>
        </div>

        <!-- Чати -->
        <div class="screen" id="chatScreen">
            <div style="padding: 20px; color: var(--text); text-align: center;">Чати (в розробці)</div>
        </div>

        <!-- Нижня навігація (без кнопки "Головна") -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigateTo('reelsScreen', this)">
                <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="4"/><line x1="8" y1="2" x2="8" y2="22"/><line x1="16" y1="2" x2="16" y2="22"/></svg>
                <span>Reels</span>
            </div>
            <div class="nav-item" onclick="navigateTo('profileScreen', this)">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Профіль</span>
            </div>
            <div class="nav-item" onclick="navigateTo('chatScreen', this)">
                <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                <span>Чати</span>
            </div>
        </div>

        <!-- Модалка додавання поста -->
        <div class="modal" id="addPostModal">
            <div class="modal-title">Новий пост</div>
            <textarea class="modal-input" id="postText" placeholder="Що нового?" rows="3"></textarea>
            <div class="modal-actions">
                <button class="modal-btn save" onclick="publishPost()">Опублікувати</button>
                <button class="modal-btn" onclick="closeModal('addPostModal')">Скасувати</button>
            </div>
        </div>

        <!-- Модалка сповіщень -->
        <div class="modal" id="notificationsModal">
            <div class="modal-title">Сповіщення</div>
            <div id="notificationsList"></div>
            <button class="modal-btn" onclick="closeModal('notificationsModal')">Закрити</button>
        </div>
    </div>

    <script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
    <script>
        // ===== НАЛАШТУВАННЯ BACK4APP =====
        Parse.initialize('CM3xa4Y0qWL6FdoMdzONdCQ5k3Tx5saPZ5tyDOwA', '2LElNDGzKSp6xQcK86pRk1i3qUMytf1TYQBIIG4s');
        Parse.serverURL = 'https://parseapi.back4app.com/';

        // ===== ГЛОБАЛЬНІ ЗМІННІ =====
        let currentUser = null;
        let stories = [];
        let reels = [];
        let notifications = [];

        // ===== ДОПОМІЖНІ ФУНКЦІЇ =====
        function formatDate(date) {
            const d = new Date(date);
            return `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        function getRandomAvatar() {
            const avatars = ['avatar-1', 'avatar-2', 'avatar-3'];
            return avatars[Math.floor(Math.random() * avatars.length)];
        }

        function getAvatarClass(user) {
            if (user?.avatarClass) return user.avatarClass;
            return 'avatar-default';
        }

        function getAvatarStyle(user) {
            if (user?.avatarUrl) return `background-image: url('${user.avatarUrl}')`;
            return '';
        }

        // ===== АВТОРИЗАЦІЯ =====
        async function checkAuth() {
            currentUser = Parse.User.current();
            if (!currentUser) {
                // Створюємо тестового користувача
                const user = new Parse.User();
                user.set('username', 'test@test.com');
                user.set('password', 'test123');
                user.set('email', 'test@test.com');
                user.set('firstName', 'Тест');
                user.set('lastName', 'Користувач');
                user.set('nickname', 'test');
                user.set('avatarClass', getRandomAvatar());
                try {
                    await user.signUp();
                    currentUser = user;
                } catch (e) {
                    try {
                        currentUser = await Parse.User.logIn('test@test.com', 'test123');
                    } catch (err) {
                        console.error('Помилка авторизації');
                    }
                }
            }
            document.getElementById('loadingScreen').classList.add('hidden');
            loadStories();
            loadReels();
            updateProfile();
        }

        // ===== STORIES =====
        async function loadStories() {
            const Story = Parse.Object.extend('Story');
            const query = new Parse.Query(Story);
            query.include('author');
            query.descending('createdAt');
            const results = await query.find();
            
            // Додаємо свою історію
            const userStory = {
                id: 'me',
                author: currentUser,
                image: null,
                isOwn: true
            };
            stories = [userStory, ...results];
            renderStories();
        }

        function renderStories() {
            const container = document.getElementById('stories');
            container.innerHTML = stories.map(s => {
                if (s.isOwn) {
                    return `
                        <div class="story" onclick="addStory()">
                            <div class="story-add">+</div>
                            <span class="story-name">Ваша історія</span>
                        </div>
                    `;
                }
                const author = s.get('author');
                return `
                    <div class="story" onclick="viewStory('${author.id}')">
                        <div class="story-avatar ${getAvatarClass(author)}" style="${getAvatarStyle(author)}"></div>
                        <span class="story-name">${author.get('firstName')}</span>
                    </div>
                `;
            }).join('');
        }

        window.addStory = function() {
            alert('Функція додавання історії (заглушка)');
        };

        window.viewStory = function(userId) {
            alert('Перегляд історії користувача ' + userId);
        };

        // ===== REELS =====
        async function loadReels() {
            // Тестові рилси
            reels = [
                {
                    id: 1,
                    video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4',
                    author: { firstName: 'Олександр', lastName: 'К', avatar: 'avatar-1' },
                    description: '🌿 Ранок у горах',
                    likes: 124,
                    comments: 12
                },
                {
                    id: 2,
                    video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4',
                    author: { firstName: 'Марія', lastName: 'Л', avatar: 'avatar-2' },
                    description: '☕ Кава та настрій',
                    likes: 89,
                    comments: 5
                }
            ];
            renderReels();
        }

        function renderReels() {
            const container = document.getElementById('reelsContainer');
            container.innerHTML = reels.map(r => `
                <div class="reel">
                    <video class="reel-video" src="${r.video}" loop muted playsinline></video>
                    <div class="reel-overlay">
                        <div class="reel-author">
                            <div class="reel-avatar ${r.author.avatar}"></div>
                            <span>${r.author.firstName} ${r.author.lastName}</span>
                        </div>
                        <div>${r.description}</div>
                    </div>
                    <div class="reel-actions">
                        <div class="reel-action" onclick="likeReel('${r.id}')">
                            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            <span>${r.likes}</span>
                        </div>
                        <div class="reel-action" onclick="commentReel('${r.id}')">
                            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            <span>${r.comments}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // Запускаємо перше відео
            const videos = container.querySelectorAll('video');
            if (videos.length) {
                videos[0].play();
            }

            // Відстежуємо скрол для автозапуску
            container.addEventListener('scroll', () => {
                const reels = container.querySelectorAll('.reel');
                reels.forEach((reel, index) => {
                    const rect = reel.getBoundingClientRect();
                    const video = reel.querySelector('video');
                    if (video) {
                        if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
                            video.play();
                        } else {
                            video.pause();
                        }
                    }
                });
            });
        }

        window.likeReel = function(id) {
            alert('Лайк для рилса ' + id);
        };

        window.commentReel = function(id) {
            alert('Коментар до рилса ' + id);
        };

        // ===== НАВІГАЦІЯ =====
        window.navigateTo = function(screenId, element) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if (element) element.classList.add('active');

            if (screenId === 'profileScreen') updateProfile();
        };

        // ===== ПРОФІЛЬ =====
        async function updateProfile() {
            const user = currentUser;
            document.getElementById('profileFullName').textContent = `${user.get('firstName')} ${user.get('lastName')}`;
            document.getElementById('profileNick').textContent = `@${user.get('nickname')}`;
            document.getElementById('profileBio').textContent = user.get('bio') || 'Розкажи про себе...';
            
            const avatar = document.getElementById('profileAvatar');
            avatar.className = `profile-avatar ${getAvatarClass(user)}`;
            if (user.get('avatarUrl')) {
                avatar.style.backgroundImage = `url('${user.get('avatarUrl')}')`;
            }
        }

        // ===== МОДАЛКИ =====
        window.openAddPostModal = () => document.getElementById('addPostModal').classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');
        
        window.toggleNotifications = () => {
            document.getElementById('notificationsModal').classList.toggle('active');
        };

        window.publishPost = () => {
            alert('Пост опубліковано (тест)');
            closeModal('addPostModal');
        };

        // ===== ДНЕВНА ФІЧА =====
        const features = ['🔥', '67', '⭐', '☀️', '🎯', '💫'];
        let featureIndex = 0;
        window.changeDailyFeature = function() {
            featureIndex = (featureIndex + 1) % features.length;
            document.getElementById('dailyFeature').textContent = features[featureIndex];
        };

        // ===== ЗАПУСК =====
        window.onload = () => {
            checkAuth();
        };
    </script>
</body>
</html>
