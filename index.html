<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Renitea — твой момент</title>
  <style>
    /* ========== БАЗОВЫЕ СТИЛИ ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      min-height: 100vh;
      background: #fafafa;
    }
    
    /* ========== ЛОГИН ========== */
    .login-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=1950&auto=format') center/cover no-repeat;
      z-index: 2000;
    }
    .login-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(3px);
    }
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      margin: 16px;
      background: white;
      border-radius: 28px;
      padding: 32px 28px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }
    .login-logo {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #ff6cab, #ffdd59, #4cd964, #34aadc, #5856d6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .login-subtitle {
      font-size: 14px;
      color: #6b7280;
      margin: 8px 0 8px;
    }
    .login-tabs {
      display: flex;
      gap: 10px;
      background: #f0f0f0;
      padding: 5px;
      border-radius: 60px;
      margin-bottom: 24px;
    }
    .login-tab {
      flex: 1;
      border: none;
      padding: 10px;
      border-radius: 60px;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      color: #6b7280;
      transition: all 0.2s;
    }
    .login-tab.active {
      background: #262626;
      color: white;
    }
    .login-input-wrapper {
      position: relative;
      margin-bottom: 16px;
    }
    .login-emoji {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
    }
    .login-input {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 16px;
      padding: 12px 16px 12px 48px;
      background: white;
      font-size: 14px;
      transition: all 0.2s;
    }
    .login-input:focus {
      outline: none;
      border-color: #262626;
      box-shadow: 0 0 0 3px rgba(38, 38, 38, 0.1);
    }
    .login-btn {
      width: 100%;
      border: none;
      border-radius: 40px;
      padding: 12px;
      background: #262626;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .login-btn:hover {
      background: #111;
      transform: translateY(-2px);
    }
    .login-error {
      color: #e86a6a;
      font-size: 13px;
      margin-top: 10px;
    }
    
    /* ========== APP ========== */
    .app {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      background: #fafafa;
    }
    
    /* ========== ТОПБАР ========== */
    .topbar {
      height: 60px;
      background: white;
      border-bottom: 1px solid #dbdbdb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .brand {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #ff6cab, #ffdd59, #4cd964, #34aadc, #5856d6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .search-wrapper {
      position: relative;
      width: 260px;
    }
    .search {
      width: 100%;
      border-radius: 60px;
      border: 1px solid #dbdbdb;
      padding: 8px 16px;
      background: #fafafa;
      font-size: 14px;
    }
    .search:focus {
      outline: none;
      border-color: #262626;
    }
    .search-dropdown {
      position: absolute;
      top: 45px;
      left: 0;
      width: 100%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border: 1px solid #dbdbdb;
      z-index: 200;
      display: none;
      max-height: 300px;
      overflow-y: auto;
    }
    .search-dropdown.active { display: block; }
    .search-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
    }
    .search-item:hover { background: #fafafa; }
    .search-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #efefef;
      overflow: hidden;
    }
    .search-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    /* ========== УВЕДОМЛЕНИЯ ========== */
    .notifications-icon {
      position: relative;
      cursor: pointer;
      margin-left: 12px;
    }
    .notifications-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      background: #ed4956;
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 20px;
      display: none;
    }
    .notifications-dropdown {
      position: absolute;
      top: 50px;
      right: 0;
      width: 320px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border: 1px solid #dbdbdb;
      z-index: 200;
      display: none;
      max-height: 400px;
      overflow-y: auto;
    }
    .notifications-dropdown.active { display: block; }
    .notification-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      font-size: 13px;
    }
    
    /* ========== MAIN ROW ========== */
    .main-row {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    /* ========== ПРАВАЯ НАВИГАЦИЯ ========== */
    .right-nav {
      width: 80px;
      background: white;
      border-left: 1px solid #dbdbdb;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      gap: 20px;
    }
    .nav-item {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #8e8e8e;
      transition: all 0.2s;
    }
    .nav-item:hover {
      background: rgba(0, 0, 0, 0.05);
      transform: scale(1.05);
    }
    .nav-item.active {
      background: #262626;
      color: white;
    }
    .nav-item svg {
      width: 26px;
      height: 26px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }
    .nav-label {
      font-size: 11px;
      color: #8e8e8e;
      margin-top: 4px;
      text-align: center;
    }
    .nav-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    
    /* ========== ЭКРАНЫ ========== */
    .screen {
      display: none;
    }
    .screen.active {
      display: block;
    }
    
    /* ========== FEED ========== */
    .feed-composer {
      max-width: 600px;
      margin: 0 auto 20px;
      background: white;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #dbdbdb;
    }
    .feed-composer textarea {
      width: 100%;
      border: 1px solid #dbdbdb;
      border-radius: 12px;
      padding: 12px;
      resize: vertical;
      min-height: 70px;
      font-size: 14px;
    }
    .feed-composer textarea:focus { outline: none; border-color: #262626; }
    .feed-composer-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .feed-publish-btn {
      background: linear-gradient(135deg, #ff6cab, #ffdd59, #4cd964, #34aadc);
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      transition: transform 0.2s;
    }
    .feed-publish-btn:hover { transform: scale(1.05) rotate(90deg); }
    .feed-list {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .feed-post {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #dbdbdb;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }
    .post-author-info {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .post-avatar-small {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #efefef;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .post-avatar-small img { width: 100%; height: 100%; object-fit: cover; }
    .default-avatar-icon {
      width: 36px;
      height: 36px;
      background: #e0e0e0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8e8e8e;
    }
    .post-author-name { font-weight: 600; font-size: 14px; color: #262626; }
    .post-date { font-size: 11px; color: #8e8e8e; }
    .feed-post-image {
      width: 100%;
      max-height: 500px;
      background: #f0f0f0;
      cursor: zoom-in;
      overflow: hidden;
    }
    .feed-post-image img {
      width: 100%;
      height: auto;
      object-fit: contain;
      transition: transform 0.3s ease;
    }
    .feed-post-image.zoomed {
      cursor: zoom-out;
      overflow: auto;
    }
    .feed-post-image.zoomed img {
      transform: scale(2);
    }
    /* ДЕЙСТВИЯ — Instagram отступы 24px между иконками */
    .post-actions-top {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 6px 16px;
      border-bottom: 1px solid #efefef;
    }
    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #262626;
      padding: 4px 8px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .action-btn:hover {
      background: rgba(0, 0, 0, 0.05);
      transform: scale(1.02);
    }
    .action-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }
    .action-btn.liked svg path {
      fill: #ed4956;
      stroke: #ed4956;
    }
    .action-count {
      font-size: 12px;
      font-weight: 500;
    }
    .feed-post-text {
      padding: 12px 16px;
      font-size: 14px;
      color: #262626;
    }
    
    /* ========== КОММЕНТАРИИ ========== */
    .comments-section {
      padding: 0 16px 12px;
      border-top: 1px solid #efefef;
    }
    .comment-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }
    .comment-content {
      display: flex;
      gap: 8px;
      flex: 1;
    }
    .comment-author {
      font-weight: 600;
      color: #262626;
      cursor: pointer;
    }
    .comment-text { color: #262626; }
    .delete-comment-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #8e8e8e;
      padding: 0 6px;
    }
    .delete-comment-btn:hover { color: #ed4956; }
    .comment-input-wrapper {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      border-top: 1px solid #efefef;
      margin-top: 8px;
    }
    .comment-input {
      flex: 1;
      border: none;
      padding: 8px 0;
      font-size: 13px;
      outline: none;
    }
    .comment-submit {
      background: none;
      border: none;
      color: #0095f6;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* ========== ЧАТЫ — ФИКСИРОВАННОЕ ОКНО ========== */
    .chats-layout {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 140px);
      min-height: 500px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #dbdbdb;
    }
    .chat-list {
      background: #fafafa;
      border-right: 1px solid #dbdbdb;
      overflow-y: auto;
      height: 100%;
    }
    .chat-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      cursor: pointer;
      border-bottom: 1px solid #efefef;
      transition: background 0.2s;
    }
    .chat-item:hover { background: rgba(0, 0, 0, 0.05); }
    .chat-item.active { background: rgba(0, 0, 0, 0.05); }
    .chat-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #efefef;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .default-avatar-icon-big {
      width: 50px;
      height: 50px;
      background: #e0e0e0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8e8e8e;
    }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; color: #262626; }
    .chat-last-message {
      font-size: 12px;
      color: #8e8e8e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Фиксированная структура диалога */
    .chat-dialog {
      display: flex;
      flex-direction: column;
      height: 100%;
      background-color: #fafafa;
      position: relative;
    }
    .chat-dialog-header {
      padding: 14px;
      border-bottom: 1px solid #dbdbdb;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-dialog-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #efefef;
    }
    .chat-dialog-body {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(250, 250, 250, 0.9);
    }
    .msg {
      max-width: 70%;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 14px;
      display: flex;
      flex-direction: column;
    }
    .msg-time {
      font-size: 10px;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .msg-text {
      word-wrap: break-word;
    }
    .msg.me {
      margin-left: auto;
      background: #0095f6;
      color: white;
    }
    .msg.them {
      background: white;
      color: #262626;
      border: 1px solid #dbdbdb;
    }
    .chat-dialog-input {
      display: flex;
      gap: 12px;
      padding: 14px;
      border-top: 1px solid #dbdbdb;
      background: white;
      flex-shrink: 0;
    }
    .chat-dialog-input input {
      flex: 1;
      border-radius: 40px;
      border: 1px solid #dbdbdb;
      padding: 12px 16px;
      font-size: 14px;
      background: white;
    }
    .chat-dialog-input input:focus { outline: none; border-color: #262626; }
    .chat-dialog-input button {
      border-radius: 40px;
      border: none;
      padding: 12px 20px;
      background: #0095f6;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.2s;
    }
    .chat-dialog-input button:hover { transform: translateY(-1px); }
    
    /* ========== ПРОФИЛЬ ========== */
    .profile-header {
      max-width: 760px;
      margin: 0 auto 24px;
      background: white;
      border-radius: 16px;
      border: 1px solid #dbdbdb;
    }
    .profile-cover {
      height: 140px;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .profile-avatar-wrap {
      display: flex;
      justify-content: center;
      margin-top: -50px;
    }
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid white;
      overflow: hidden;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info {
      text-align: center;
      padding: 0 20px 20px;
    }
    .profile-name { font-size: 22px; font-weight: 700; color: #262626; }
    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin: 16px 0;
      cursor: pointer;
      color: #262626;
    }
    .profile-stats span:hover { opacity: 0.7; }
    .profile-bio {
      font-size: 14px;
      margin: 12px auto;
      padding: 12px 20px;
      background: #fafafa;
      border-radius: 20px;
      max-width: 80%;
      color: #262626;
    }
    .profile-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary, .btn-ghost {
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: transform 0.2s;
    }
    .btn-primary {
      background: #0095f6;
      color: white;
    }
    .btn-primary:hover { background: #0081d6; transform: translateY(-1px); }
    .btn-ghost {
      background: #efefef;
      color: #262626;
    }
    .btn-ghost:hover { background: #e0e0e0; transform: translateY(-1px); }
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 760px;
      margin: 0 auto;
    }
    .profile-grid-item {
      aspect-ratio: 1/1;
      background: #efefef;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .profile-grid-item:hover { transform: scale(0.98); }
    .profile-grid-item img { width: 100%; height: 100%; object-fit: cover; }
    
    /* ========== ПАСПОРТ ========== */
    .passport-layout {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .passport-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #dbdbdb;
    }
    .visa-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .visa-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #dbdbdb;
      transition: transform 0.2s;
    }
    .visa-card:hover { transform: scale(1.02); }
    
    /* ========== СТИКИ ========== */
    .stiki-composer {
      max-width: 520px;
      margin: 0 auto 16px;
      background: white;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #dbdbdb;
    }
    .stiki-wrapper {
      max-width: 520px;
      margin: 0 auto;
      height: 70vh;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      border-radius: 16px;
    }
    .stiki-card {
      position: relative;
      height: 70vh;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      scroll-snap-align: start;
      margin-bottom: 16px;
    }
    .stiki-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .stiki-reactions {
      position: absolute;
      bottom: 20px;
      right: 16px;
      display: flex;
      gap: 16px;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 16px;
      border-radius: 40px;
    }
    .stiki-reaction {
      cursor: pointer;
      display: flex;
      gap: 6px;
      color: white;
      font-size: 20px;
      transition: transform 0.2s;
    }
    .stiki-reaction:hover { transform: scale(1.1); }
    
    /* ========== НАСТРОЙКИ ========== */
    .settings-panel {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #dbdbdb;
    }
    .patterns-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }
    .pattern-card {
      width: 100px;
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s;

function formatRelativeTime(timestamp) {
  if (!timestamp) return '';
  const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
  const now = new Date();
  const diffSec = Math.floor((now - date) / 1000);
  if (diffSec < 60) return `${diffSec} сек назад`;
  const diffMin = Math.floor(diffSec / 60);
  if (diffMin < 60) return `${diffMin} мин назад`;
  const diffHour = Math.floor(diffMin / 60);
  if (diffHour < 24) return `${diffHour} ч назад`;
  const diffDay = Math.floor(diffHour / 24);
  if (diffDay < 7) return `${diffDay} дн назад`;
  if (diffDay < 30) return `${Math.floor(diffDay / 7)} нед назад`;
  if (diffDay < 365) return `${Math.floor(diffDay / 30)} мес назад`;
  return `${Math.floor(diffDay / 365)} г назад`;

async function compressImage(file, maxWidth = 1080, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function imageToBase64(blob) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(blob);
  });
}
async function ensureUserDoc(user) {
  const ref = db.collection('users').doc(user.uid);
  const snap = await ref.get();
  if (!snap.exists) {
    await ref.set({
      email: user.email,
      name: user.displayName || user.email.split('@')[0],
      nick: '@' + user.email.split('@')[0],
      persona: '',
      bio: '',
      avatarBase64: '',
      headerPattern: '1',
      followers: [],
      following: [],
      chatBackground: '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
}
async function setChatBackgroundImage(file) {
  if (!state.currentUser) return;
  try {
    const compressed = await compressImage(file, 1920, 0.7);
    const base64 = await imageToBase64(compressed);
    await db.collection('users').doc(state.currentUser.uid).update({ chatBackground: base64 });
    if (currentChatUserId) loadChatBackground(currentChatUserId);
    alert('✅ Фон чата обновлён!');
  } catch (e) { alert('❌ Ошибка загрузки фона'); }
}
async function loadChatBackground(userId) {
  const user = getUserFromCache(userId);
  if (chatDialogContainer && user?.chatBackground) {
    chatDialogContainer.style.backgroundImage = `url('${user.chatBackground}')`;
    chatDialogContainer.style.backgroundSize = 'cover';
    chatDialogContainer.style.backgroundPosition = 'center';
  } else if (chatDialogContainer) {
    chatDialogContainer.style.backgroundImage = '';
    chatDialogContainer.style.backgroundColor = '#fafafa';
  }
}
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + name);
  if (el) el.classList.add('active');
  navItems.forEach(i => { i.classList.remove('active'); if (i.dataset.screen === name) i.classList.add('active'); });
}
function applyHeaderPattern(user) {
  if (!profileCover) return;
  const pattern = user.headerPattern || '1';
  const patterns = {
    '1': 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
    '2': 'repeating-linear-gradient(45deg, #ff6cab, #ff6cab 20px, #ffdd59 20px, #ffdd59 40px)',
    '3': 'radial-gradient(circle at 20% 40%, #4cd964, #34aadc)',
    '4': 'linear-gradient(135deg, #f5f0e6 0%, #e8d5b5 100%)',
    '5': 'repeating-linear-gradient(90deg, #a8c9a5, #a8c9a5 20px, #c9b896 20px, #c9b896 40px)',
    '6': 'linear-gradient(135deg, #2c3e50, #3498db)'
  };
  profileCover.style.background = patterns[pattern] || patterns['1'];
}
